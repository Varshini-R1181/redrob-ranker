# ============================================================================
# AI tools declaration (be honest — contradictions in Stage 5 are penalized)
# ============================================================================
ai_tools_used:
  - "Claude"   # used for architectural discussion and code review throughout

ai_usage_summary: |
  Claude was used for architectural discussion, code review, and stress-testing
  design decisions at each stage of development. No candidate data from the
  hackathon dataset was fed to any external LLM. All scoring logic (regex
  patterns, weight calibration, honeypot checks, tiebreak signals) was developed
  and iteratively improved by running the code on actual candidate data and
  reading the output — not generated by AI. The ranker runs fully offline with
  no external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage, pure-stdlib rule-based ranker. Stage 1 scores all 100K candidates
  using a multiplicative title-gate over five evidence components: shipped
  production evidence (regex over career history for deployment verbs + IR/ML
  noun co-occurrence), trusted skills (gated by duration/endorsements/proficiency),
  eval-framework experience (NDCG/MRR/A-B test mentions), YoE bell curve, and
  location fit. A behavioral multiplier (last_active, notice period, response rate)
  and structural honeypot checks apply as further modifiers. Stage 2 re-ranks
  the top 150 by a composite that adds saved_by_recruiters_30d and
  github_activity_score as calibrated tiebreakers (max bonus 0.013, smaller than
  natural tier gaps so ordering is preserved). All engineering decisions were
  made empirically: 8 distinct bugs were found by running on real data and reading
  output, none by architectural discussion alone.

